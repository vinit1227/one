<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAGEEEEEE II — For Anshika</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  body{ background: radial-gradient(ellipse at 50% -10%, #4a1530 0%, #16090f 55%); }
  #particles{ display:none; }

  #heart-particles{ position: fixed; inset:0; pointer-events:none; z-index:1; overflow:hidden; }
  .heart-mote{
    position:absolute; bottom:-30px;
    opacity: 0;
    animation: heart-rise linear infinite;
    filter: drop-shadow(0 0 4px rgba(255,140,190,0.45));
  }
  @keyframes heart-rise{
    0%{ transform: translateY(0) translateX(0) rotate(0deg); opacity:0; }
    12%{ opacity:0.65; }
    88%{ opacity:0.5; }
    100%{ transform: translateY(-112vh) translateX(var(--drift,20px)) rotate(var(--rot,15deg)); opacity:0; }
  }

  #reels-frame{
    max-width: min(430px, 92vw);
    margin: 0 auto;
    border: 1px solid rgba(255,140,190,0.35);
    border-radius: 28px;
    padding: 10px 22px 10px 10px;
    background: linear-gradient(180deg, rgba(255,140,190,0.08), transparent);
    position: relative;
  }
  #reels-indicator{
    position:absolute; top:56px; right:6px; bottom:10px; width:4px;
    display:flex; flex-direction:column; gap:5px; z-index:4;
  }
  #reels-indicator .seg{
    flex:1; border-radius:3px;
    background: rgba(255,140,190,0.15);
    transition: background 0.3s ease;
  }
  #reels-indicator .seg.watched{ background: rgba(255,140,190,0.45); }
  #reels-indicator .seg.current{ background: #ff8fc0; }
  .reels-toggle{
    display:flex; align-items:center; justify-content:center; gap:10px;
    margin-bottom: 12px;
    font-size: 0.72rem; letter-spacing: 0.18em; text-transform:uppercase;
    color: var(--parchment-dim);
  }
  .switch{
    width: 38px; height: 20px; border-radius: 20px;
    background: rgba(255,140,190,0.22);
    position:relative; cursor:pointer; border:none;
    transition: background 0.3s ease;
  }
  .switch::after{
    content:''; position:absolute; top:2px; left:2px;
    width:16px; height:16px; border-radius:50%;
    background: #ff9dc4;
    transition: transform 0.3s ease;
  }
  .switch.on{ background: #ff6fa8; }
  .switch.on::after{ transform: translateX(18px); }

  #reels-scroller{
    height: 690px; max-height: 70vh;
    overflow-y: scroll; scroll-snap-type: y mandatory;
    border-radius: 20px; scrollbar-width: none;
  }
  #reels-scroller::-webkit-scrollbar{ display:none; }

  .reel-card{
    scroll-snap-align: center;
    height: 690px; max-height: 70vh;
    position: relative;
    display:flex; align-items:flex-end;
    border-radius: 20px; overflow:hidden;
    background: #000;
  }
  .reel-card video{ position:absolute; inset:0; width:100%; height:100%; object-fit: cover; cursor:pointer; }
  .reel-placeholder{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
    background: linear-gradient(160deg, var(--bordeaux) 0%, var(--ink) 100%);
    border: 1px dashed rgba(201,166,107,0.4);
    color: var(--parchment-dim);
    font-family: var(--serif); font-style: italic; font-size: 1rem;
    text-align:center; padding: 20px;
  }
  .reel-caption{
    position:relative; z-index:2; width:100%;
    padding: 22px 18px;
    background: linear-gradient(0deg, rgba(0,0,0,0.75), transparent);
    font-family: var(--serif); font-style: italic; font-size: 1.05rem;
    color: var(--parchment);
  }
  .reel-mute{
    position:absolute; top:14px; right:14px; z-index:3;
    background: rgba(0,0,0,0.4); border: 1px solid rgba(255,140,190,0.5);
    color: #ff9dc4; width:34px; height:34px; border-radius:50%;
    cursor:pointer; font-size: 0.9rem;
  }
  .reel-navbtns{
    position:absolute; right:14px; top:50%; transform:translateY(-50%);
    display:flex; flex-direction:column; gap:12px; z-index:3;
  }
  .reel-nav{
    background: rgba(0,0,0,0.4); border: 1px solid rgba(255,140,190,0.5);
    color: #ff9dc4; width:34px; height:34px; border-radius:50%;
    cursor:pointer; font-size: 1rem;
    display:flex; align-items:center; justify-content:center;
    transition: opacity 0.2s ease, transform 0.2s ease;
  }
  .reel-nav:hover{ transform: scale(1.08); }
  .reel-nav.disabled{ opacity:0.2; pointer-events:none; }

  .chapter-tag{ color: #ffb8d9; }
  #reels .eyebrow{ color: #ff8fc0; }
  #reels .nav-continue{
    background: linear-gradient(180deg, #ffb3d9, #ff6fa8);
    color: #3a0f22;
    box-shadow: 0 10px 30px rgba(255,111,168,0.25);
  }
  #reels .nav-back{ color: #ffb8d9; }
</style>
</head>
<body>

  <div id="particles"></div>
  <div class="chapter-tag">PAGE II / IV</div>

  <main>
    <section class="page" id="reels">
      <div class="chapter-head reveal">
        <div class="eyebrow">PAGE II</div>
        <h2>EDITSSSSS</h2>
        <p style="color:var(--parchment-dim); font-weight:300; margin-top:10px; font-style:italic;">
          Insta pe toh bahut reels dekh liya, ab yaha pe dekho.....
        </p>
      </div>

      <div id="reels-frame" class="reveal">
        <div class="reels-toggle">
          <span>Manual scroll</span>
          <button class="switch" id="autoplaySwitch" aria-label="Toggle auto-advance"></button>
          <span>Auto-advance</span>
        </div>
        <div id="reels-scroller"></div>
        <div id="reels-indicator"></div>
      </div>

      <a href="chapter3.html" class="nav-continue reveal">My Gallery →</a>
      <a href="chapter1.html" class="nav-back reveal">← Chapter I</a>
    </section>
  </main>

  <footer class="sitefooter">made with loveee</footer>

<script src="app.js"></script>
<script src="reels.js"></script>
<script>
(function(){
  const field = document.createElement('div');
  field.id = 'heart-particles';
  document.body.appendChild(field);
  const hearts = ['💗','💓','💕','🩷'];
  for (let i = 0; i < 22; i++){
    const h = document.createElement('div');
    h.className = 'heart-mote';
    h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
    h.style.left = Math.random() * 100 + 'vw';
    h.style.fontSize = (10 + Math.random() * 14) + 'px';
    h.style.setProperty('--drift', (Math.random() * 80 - 40) + 'px');
    h.style.setProperty('--rot', (Math.random() * 40 - 20) + 'deg');
    h.style.animationDuration = (9 + Math.random() * 8) + 's';
    h.style.animationDelay = (Math.random() * 10) + 's';
    field.appendChild(h);
  }
})();
</script>
</body>
</html>
