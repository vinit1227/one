<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>PAGEEEEEE II — For Anshika</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* Minimal global resets & variables — style.css assumed to exist, but we embed essentials */
    :root {
      --gold: #c9a66b;
      --gold-bright: #e8c77e;
      --parchment: #f3ecd8;
      --parchment-dim: #b9a88c;
      --bordeaux: #4a0e1c;
      --ink: #1a1a1a;
      --serif: 'Cormorant Garamond', serif;
      --sans: 'Jost', sans-serif;
    }
    body {
      margin: 0;
      background: #0c0b0a;
      color: var(--parchment);
      font-family: var(--sans);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }
    #particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .chapter-tag {
      position: fixed;
      top: 18px;
      right: 24px;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      color: var(--gold);
      background: rgba(10, 8, 6, 0.65);
      backdrop-filter: blur(6px);
      padding: 6px 16px;
      border-radius: 30px;
      border: 1px solid rgba(201, 166, 107, 0.35);
      z-index: 10;
    }
    main {
      position: relative;
      z-index: 2;
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .page {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .chapter-head {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      color: var(--gold-bright);
      margin-bottom: 0.4rem;
    }
    h2 {
      font-family: var(--serif);
      font-weight: 500;
      font-size: 2.8rem;
      letter-spacing: 0.12em;
      margin: 0.5rem 0;
      color: var(--parchment);
      text-transform: uppercase;
    }
    .reveal {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
    
    /* reels frame — slightly bigger and refined */
    #reels-frame {
      max-width: 440px;  /* increased from 380px */
      width: 100%;
      margin: 0 auto;
      border: 1px solid rgba(201, 166, 107, 0.35);
      border-radius: 34px;
      padding: 12px 24px 12px 12px;
      background: linear-gradient(180deg, rgba(201, 166, 107, 0.08), rgba(0,0,0,0.2));
      backdrop-filter: blur(4px);
      box-shadow: 0 18px 40px -10px rgba(0,0,0,0.7);
      position: relative;
    }
    #reels-indicator {
      position: absolute;
      top: 64px;
      right: 8px;
      bottom: 14px;
      width: 5px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 5;
    }
    #reels-indicator .seg {
      flex: 1;
      border-radius: 4px;
      background: rgba(232, 199, 126, 0.18);
      transition: background 0.25s ease;
      min-height: 4px;
    }
    #reels-indicator .seg.watched {
      background: rgba(232, 199, 126, 0.6);
    }
    #reels-indicator .seg.current {
      background: var(--gold-bright);
      box-shadow: 0 0 10px var(--gold);
    }
    .reels-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 16px;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--parchment-dim);
    }
    .switch {
      width: 40px;
      height: 22px;
      border-radius: 22px;
      background: rgba(201, 166, 107, 0.28);
      position: relative;
      cursor: pointer;
      border: none;
      transition: background 0.3s;
    }
    .switch::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #f0d89c;
      transition: transform 0.3s ease;
    }
    .switch.on {
      background: var(--gold);
    }
    .switch.on::after {
      transform: translateX(18px);
    }
    #reels-scroller {
      height: 680px;      /* slightly taller */
      max-height: 70vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      border-radius: 24px;
      scrollbar-width: none;
    }
    #reels-scroller::-webkit-scrollbar {
      display: none;
    }
    .reel-card {
      scroll-snap-align: center;
      height: 680px;
      max-height: 70vh;
      position: relative;
      display: flex;
      align-items: flex-end;
      border-radius: 24px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 8px 22px rgba(0,0,0,0.6);
    }
    .reel-card video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .reel-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: linear-gradient(160deg, #3e0f1a, #151010);
      border: 1px dashed rgba(201, 166, 107, 0.5);
      color: var(--parchment-dim);
      font-family: var(--serif);
      font-style: italic;
      font-size: 1.1rem;
      text-align: center;
      padding: 20px;
    }
    .reel-caption {
      position: relative;
      z-index: 3;
      width: 100%;
      padding: 24px 20px;
      background: linear-gradient(0deg, rgba(0, 0, 0, 0.8), transparent);
      font-family: var(--serif);
      font-style: italic;
      font-size: 1.1rem;
      color: var(--parchment);
      letter-spacing: 0.4px;
    }
    .reel-mute {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 4;
      background: rgba(10, 8, 6, 0.55);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(201, 166, 107, 0.55);
      color: var(--gold-bright);
      width: 38px;
      height: 38px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
    }
    .reel-mute:hover {
      background: rgba(201, 166, 107, 0.35);
    }
    .reel-navbtns {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 14px;
      z-index: 4;
    }
    .reel-nav {
      background: rgba(10, 8, 6, 0.55);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(201, 166, 107, 0.55);
      color: var(--gold-bright);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.25s;
    }
    .reel-nav:hover {
      transform: scale(1.1);
      background: rgba(201, 166, 107, 0.35);
    }
    .reel-nav.disabled {
      opacity: 0.25;
      pointer-events: none;
    }
    .nav-continue, .nav-back {
      display: inline-block;
      margin-top: 2.5rem;
      font-family: var(--serif);
      font-size: 1.3rem;
      font-style: italic;
      color: var(--gold);
      text-decoration: none;
      border-bottom: 1px dashed var(--gold);
      transition: 0.3s;
      letter-spacing: 0.5px;
    }
    .nav-back {
      margin-top: 1.2rem;
      font-size: 1.1rem;
      color: var(--parchment-dim);
      border-bottom-color: rgba(185, 168, 140, 0.5);
    }
    .nav-continue:hover, .nav-back:hover {
      color: var(--gold-bright);
      border-bottom-color: var(--gold-bright);
    }
    .sitefooter {
      text-align: center;
      padding: 2rem 1rem 1.5rem;
      color: #5a5040;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      position: relative;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div id="particles"></div>
  <div class="chapter-tag">PAGE II / IV</div>

  <main>
    <section class="page" id="reels">
      <div class="chapter-head reveal">
        <div class="eyebrow">PAGE II</div>
        <h2>EDITSSSSS</h2>
        <p style="color:var(--parchment-dim); font-weight:300; margin-top:10px; font-style:italic;">
          Insta pe toh bahut reels dekh liya, ab yaha pe dekho.....
        </p>
      </div>

      <div id="reels-frame" class="reveal">
        <div class="reels-toggle">
          <span>Manual scroll</span>
          <button class="switch" id="autoplaySwitch" aria-label="Toggle auto-advance"></button>
          <span>Auto-advance</span>
        </div>
        <div id="reels-scroller"></div>
        <div id="reels-indicator"></div>
      </div>

      <a href="chapter3.html" class="nav-continue reveal">My Gallery →</a>
      <a href="chapter1.html" class="nav-back reveal">← Chapter I</a>
    </section>
  </main>

  <footer class="sitefooter">made with loveee</footer>

  <script>
    // Simple reveal observer (if app.js not loaded or for standalone)
    document.addEventListener('DOMContentLoaded', () => {
      const revealElements = document.querySelectorAll('.reveal');
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
          }
        });
      }, { threshold: 0.2 });
      revealElements.forEach(el => observer.observe(el));
      
      // Trigger particles placeholder (lightweight)
      const particlesDiv = document.getElementById('particles');
      if (particlesDiv) {
        particlesDiv.style.background = 'radial-gradient(circle at 20% 30%, rgba(201,166,107,0.06) 0%, transparent 45%)';
      }
    });
  </script>

  <script>
