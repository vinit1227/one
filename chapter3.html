<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapter III — For Anshika</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  #gallery-grid{
    display:grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    width:100%; max-width: 720px;
  }
  .photo{
    aspect-ratio: 1; border-radius: 6px; overflow:hidden; cursor:pointer;
    border: 1px solid rgba(201,166,107,0.25); position:relative;
  }
  .photo img{ width:100%; height:100%; object-fit:cover; display:block; transition: transform 0.5s ease; }
  .photo:hover img{ transform: scale(1.08); }
  .photo-placeholder{
    width:100%; height:100%; display:flex; align-items:center; justify-content:center;
    background: linear-gradient(160deg, var(--bordeaux) 0%, var(--ink) 100%);
    color: var(--gold); font-size: 1.4rem;
  }
  #lightbox{
    position: fixed; inset:0; z-index: 1000;
    background: rgba(8,6,7,0.95);
    display:none; align-items:center; justify-content:center; flex-direction:column;
  }
  #lightbox.active{ display:flex; }
  #lightbox img{ max-width: 88vw; max-height: 76vh; border-radius: 4px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
  .lb-controls{ display:flex; align-items:center; gap: 34px; margin-top: 22px; }
  .lb-btn{
    background:none; border: 1px solid rgba(201,166,107,0.5);
    color: var(--gold-bright); width: 42px; height:42px; border-radius:50%;
    cursor:pointer; font-size: 1.1rem;
  }
  .lb-close{
    position:absolute; top: 26px; right: 30px;
    background:none; border:none; color: var(--parchment-dim);
    font-size: 1.6rem; cursor:pointer;
  }
  @media (max-width: 560px){ #gallery-grid{ grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>

  <div id="particles"></div>
  <div class="chapter-tag">Chapter III / IV</div>

  <main>
    <section class="page" id="gallery">
      <div class="chapter-head reveal">
        <div class="eyebrow">Chapter III</div>
        <h2>Every little moment</h2>
      </div>
      <div id="gallery-grid" class="reveal"></div>

      <a href="chapter4.html" class="nav-continue reveal">Continue →</a>
      <a href="chapter2.html" class="nav-back reveal">← Chapter II</a>
    </section>
  </main>

  <div id="lightbox">
    <button class="lb-close" id="lbClose" aria-label="Close">&times;</button>
    <img id="lbImg" src="" alt="">
    <div class="lb-controls">
      <button class="lb-btn" id="lbPrev" aria-label="Previous">&larr;</button>
      <button class="lb-btn" id="lbNext" aria-label="Next">&rarr;</button>
    </div>
  </div>

  <footer class="sitefooter">made with a lot of feeling</footer>

<script src="app.js"></script>
<script src="gallery.js"></script>
</body>
</html>
