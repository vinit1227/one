<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Anshika</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  body{ display:flex; align-items:center; justify-content:center; min-height:100vh; }

  .gate-inner{ text-align:center; padding: 0 24px; position:relative; z-index:2; }

  .gate-label{
    font-family: var(--serif); font-style: italic; font-size: 1.15rem;
    color: var(--parchment-dim); margin-bottom: 30px;
  }

  .seal{
    width: 90px; height: 90px; border-radius: 50%;
    margin: 0 auto 34px;
    background: radial-gradient(circle at 35% 30%, var(--gold-bright), var(--gold) 55%, #7a5c2e 100%);
    display:flex; align-items:center; justify-content:center;
    font-family: var(--serif); font-size: 1.6rem; color: var(--bordeaux-deep);
    box-shadow: 0 0 40px rgba(201,166,107,0.35), inset 0 2px 6px rgba(255,255,255,0.4), inset 0 -6px 10px rgba(0,0,0,0.35);
    animation: seal-breathe 4s ease-in-out infinite;
    transition: transform 0.4s ease;
  }
  .seal.cracking{ animation: seal-crack 0.7s ease forwards; }
  @keyframes seal-breathe{
    0%,100%{ box-shadow: 0 0 40px rgba(201,166,107,0.35), inset 0 2px 6px rgba(255,255,255,0.4), inset 0 -6px 10px rgba(0,0,0,0.35); }
    50%{ box-shadow: 0 0 55px rgba(201,166,107,0.5), inset 0 2px 6px rgba(255,255,255,0.4), inset 0 -6px 10px rgba(0,0,0,0.35); }
  }
  @keyframes seal-crack{
    0%{ transform: scale(1); } 30%{ transform: scale(1.15) rotate(-3deg); } 100%{ transform: scale(2.4); opacity:0; }
  }

  .gate-card{ transition: transform 0.25s ease; }
  .gate-card.shake{ animation: shake 0.4s ease; }
  @keyframes shake{
    0%,100%{ transform: translateX(0); }
    20%{ transform: translateX(-8px); }
    40%{ transform: translateX(8px); }
    60%{ transform: translateX(-6px); }
    80%{ transform: translateX(6px); }
  }

  .date-fields{ display:flex; align-items:center; justify-content:center; gap: 10px; margin-bottom: 22px; }
  .date-fields input{
    width: 56px; text-align:center;
    background: transparent; border: none; border-bottom: 1px solid rgba(201,166,107,0.4);
    color: var(--parchment); font-family: var(--serif); font-size: 1.6rem;
    padding: 6px 0; letter-spacing: 0.05em;
  }
  .date-fields input#yyyy{ width: 84px; }
  .date-fields input:focus{ outline:none; border-bottom-color: var(--gold-bright); }
  .date-sep{ color: var(--parchment-dim); font-family: var(--serif); font-size: 1.4rem; opacity:0.6; }

  .date-labels{ display:flex; align-items:center; justify-content:center; gap: 10px; margin-bottom: 26px; }
  .date-labels span{ width:56px; font-size: 0.6rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--parchment-dim); opacity:0.6; }
  .date-labels span:last-child{ width:84px; }

  #gateSubmit{
    font-family: var(--sans); letter-spacing: 0.14em; text-transform: uppercase; font-size: 0.72rem;
    background: linear-gradient(180deg, var(--gold-bright), var(--gold)); color: var(--bordeaux-deep);
    border:none; padding: 13px 30px; border-radius: 26px; cursor:pointer; font-weight:600;
    box-shadow: 0 8px 24px rgba(201,166,107,0.22); transition: transform 0.25s ease;
  }
  #gateSubmit:hover{ transform: translateY(-2px); }

  #gateError{
    margin-top: 18px; font-size: 0.78rem; letter-spacing: 0.05em; color: var(--rose);
    opacity:0; transition: opacity 0.3s ease; font-family: var(--sans);
  }
  #gateError.visible{ opacity:1; }

  .gate-hint{
    margin-top: 40px; font-size: 0.64rem; letter-spacing: 0.22em; text-transform:uppercase;
    color: var(--parchment-dim); opacity: 0.55;
  }
</style>
</head>
<body>

  <div id="particles"></div>

  <div class="gate-inner">
    <div class="gate-label">A letter for Anshika</div>
    <div class="seal" id="sealMark">A</div>

    <div class="gate-card" id="gateCard">
      <div class="date-labels"><span>Day</span><span></span><span>Month</span><span></span><span>Year</span></div>
      <div class="date-fields">
        <input type="text" inputmode="numeric" id="dd" maxlength="2" placeholder="DD" autocomplete="off">
        <span class="date-sep">/</span>
        <input type="text" inputmode="numeric" id="mm" maxlength="2" placeholder="MM" autocomplete="off">
        <span class="date-sep">/</span>
        <input type="text" inputmode="numeric" id="yyyy" maxlength="4" placeholder="YYYY" autocomplete="off">
      </div>
      <button id="gateSubmit">Open</button>
      <div id="gateError"></div>
    </div>

    <div class="gate-hint">only she would know this date</div>
  </div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="gate.js"></script>
</body>
</html>
